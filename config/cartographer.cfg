[mcu cartographer]
canbus_uuid: cce7d037b035

[cartographer]
mcu: cartographer
x_offset: 0
y_offset: 15
verbose: no # For extra output

[bed_mesh]
zero_reference_position: 90, 90
speed: 300
horizontal_move_z: 3
mesh_min: 30, 30 # The first probed coordinate, nearest to the origin. This coordinate is relative to the probe's location.
mesh_max: 150, 150 # The probed coordinate farthest from the origin. This is not necessarily the last point probed, as the probing process occurs in a zig-zag fashion. As with mesh_min, this coordinate is relative to the probe's location.
probe_count: 20, 20
adaptive_margin: 10
mesh_pps: 0,0 # Disable interpolation - mesh is probably dense enough

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 105

[adxl345]
cs_pin: cartographer:PA0 # For Cartographer V4
spi_bus: spi1

[resonance_tester]
accel_chip: adxl345
probe_points:
    90, 90, 20 # Fill out the blank with x and y coordinates where you want to run the resonance test.